<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&family=Cinzel:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; cursor: crosshair; }

/* شاشة الإقلاع - خط برمجي حاد */
#boot {
  position: fixed;
  inset: 0;
  background: #000000;
  color: #ffffff;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 1rem;
  line-height: 1.6;
  padding: 2.5rem;
  z-index: 10000;
  white-space: pre-wrap;
  transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), filter 1.2s ease;
  text-shadow: 0 0 5px rgba(255,255,255,0.2);
}

#boot.fade-out { opacity: 0; filter: blur(20px); pointer-events: none; }

.terminal-line {
  margin-bottom: 8px;
  opacity: 0;
  border-left: 3px solid #ffffff;
  padding-left: 15px;
  animation: fadeInLine 0.15s ease forwards;
  letter-spacing: 0.5px;
}

@keyframes fadeInLine {
  from { opacity: 0; transform: translateX(-15px); }
  to { opacity: 1; transform: translateX(0); }
}

.shake-active { animation: violentShake 0.08s infinite !important; }

@keyframes violentShake {
  0% { transform: translate(0, 0); }
  25% { transform: translate(-5px, 4px); }
  50% { transform: translate(5px, -4px); }
  75% { transform: translate(-4px, -3px); }
  100% { transform: translate(0, 0); }
}

.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.bg-video {
  width: 100%; height: 100%; object-fit: cover;
  filter: grayscale(100%) contrast(1.5) brightness(0.3);
  transform: scale(1.15);
  transition: transform 4s cubic-bezier(0.165, 0.84, 0.44, 1);
}
body.loaded .bg-video { transform: scale(1); }

.stage {
  position: relative;
  z-index: 70;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* خط العنوان الرئيسي - فخم وسينمائي */
.title {
  font-family: 'Cinzel', serif;
  font-size: clamp(4rem, 15vw, 10rem);
  color: #ffffff;
  font-weight: 700;
  letter-spacing: 35px;
  opacity: 0;
  filter: blur(15px);
  transition: all 3s cubic-bezier(0.19, 1, 0.22, 1);
}

body.loaded .title {
  opacity: 1;
  filter: blur(0);
  letter-spacing: 12px;
}

.cta-area {
  margin-top: 2rem;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1.8s ease 1.5s;
}

body.loaded .cta-area { opacity: 1; transform: translateY(0); }

.small-image {
  width: 70px; border-radius: 8px;
  filter: grayscale(100%) contrast(1.3) brightness(0.9);
  border: 1px solid rgba(255,255,255,0.4);
  margin-bottom: 15px;
  box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

.user-text {
  font-family: 'Special Elite', cursive;
  font-size: 1.1rem;
  background: rgba(0,0,0,0.8);
  border: 1px solid #ffffff;
  color: #ffffff;
  padding: 10px 30px;
  letter-spacing: 3px;
}
</style>
</head>
<body>

<div id="boot"></div>

<script>
const bootLines = [

const bootDiv = document.getElementById('boot');
let currentLineIdx = 0;

function typeLine() {
  if (currentLineIdx >= bootLines.length) {
    setTimeout(() => {
      bootDiv.classList.add('fade-out');
      document.body.classList.remove('shake-active');
      document.body.classList.add('loaded');
    }, 1600);
    return;
  }

  const content = bootLines[currentLineIdx];
  const lineDiv = document.createElement('div');
  lineDiv.className = 'terminal-line';
  bootDiv.appendChild(lineDiv);

  let charIdx = 0;
  function typeChar() {
    if (charIdx < content.length) {
      lineDiv.textContent += content[charIdx];
      charIdx++;
      setTimeout(typeChar, 50);
    } else {
      if (content === "EchO; System Will Close in 3 Secound...") {
        document.body.classList.add('shake-active');
      }
      currentLineIdx++;
      setTimeout(typeLine, content === "" ? 150 : 450);
    }
  }
  typeChar();
}

</html>
